<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GugoPro - Amazon Smart Finder | アマゾン スマート検索</title>
    <meta name="description" content="Smart shopping tool for Amazon US and Japan. Find the best products with intelligent category filters and direct search. アマゾン米国・日本のスマート検索ツール。">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-row">
                <a href="/" class="logo">✦ GugoPro</a>
                <div class="search-bar">
                    <input type="text" id="search-input">
                    <button id="search-btn">🔍</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- Main Categories -->
            <section class="section" id="cat-section">
                <div class="section-header">
                    <h2 id="cat-title">Categories</h2>
                </div>
                <div class="tag-grid" id="main-categories"></div>
            </section>

            <!-- Subcategory Panel -->
            <section class="section panel" id="sub-section" style="display:none;">
                <div class="section-header">
                    <h2 id="sub-title"></h2>
                    <button class="close-btn" id="back-btn">✕</button>
                </div>
                <div class="tag-grid" id="sub-categories"></div>
            </section>

            <!-- Brand Filter -->
            <section class="section panel" id="brand-section" style="display:none;">
                <div class="section-header">
                    <h2 id="brand-title">Brand</h2>
                </div>
                <div class="tag-grid" id="brand-tags"></div>
            </section>

            <!-- Filters Panel -->
            <section class="section panel" id="filters-panel" style="display:none;">
                <!-- Price Slider -->
                <div class="filter-block">
                    <div class="filter-block-header">
                        <span id="price-label">Price Range</span>
                        <span class="price-display" id="price-display"></span>
                    </div>
                    <div class="slider-container">
                        <input type="range" id="price-slider-min" min="0" max="1000" value="0" step="10">
                        <input type="range" id="price-slider-max" min="0" max="1000" value="1000" step="10">
                        <div class="slider-track" id="slider-track"></div>
                    </div>
                    <div class="slider-labels">
                        <span id="slider-min-label">0</span>
                        <span id="slider-max-label">1000</span>
                    </div>
                </div>

                <!-- Rating -->
                <div class="filter-block">
                    <div class="rating-row">
                        <span class="stars">★★★★☆</span>
                        <label class="toggle-label">
                            <input type="checkbox" id="rating-filter">
                            <span class="toggle-switch"></span>
                            <span id="rating-text">4 stars & above</span>
                        </label>
                    </div>
                </div>

                <!-- Material Tags -->
                <div class="filter-block" id="material-block" style="display:none;">
                    <div class="filter-block-header">
                        <span id="material-label">Material</span>
                    </div>
                    <div class="tag-grid small" id="material-tags"></div>
                </div>

                <!-- Feature Tags -->
                <div class="filter-block" id="feature-block" style="display:none;">
                    <div class="filter-block-header">
                        <span id="feature-label">Features</span>
                    </div>
                    <div class="tag-grid small" id="feature-tags"></div>
                </div>
            </section>

            <!-- Action Bar -->
            <section class="action-bar" id="action-bar" style="display:none;">
                <div class="preview-line" id="preview-line">
                    <span class="preview-icon">🔍</span>
                    <span class="preview-text" id="preview-text"></span>
                </div>
                <button class="go-btn" id="go-btn">
                    <span id="go-text">Search on Amazon</span>
                    <span class="go-arrow">→</span>
                </button>
            </section>

            <!-- Popular Searches -->
            <section class="section" id="popular-section">
                <div class="section-header">
                    <h2 id="popular-title">Trending Now</h2>
                </div>
                <div class="tag-grid" id="popular-grid"></div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="disclosure">As an Amazon Associate, I earn from qualifying purchases.<br>当サイトはAmazonアソシエイトに参加しています。</p>
            <p class="copy">© 2026 GugoPro. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
