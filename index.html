<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GugoPro - Amazon Smart Finder | アマゾン スマート検索</title>
    <meta name="description" content="Smart shopping tool for Amazon US and Japan. Find the best products with intelligent category filters and direct search. アマゾン米国・日本のスマート検索ツール。">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <!-- Header with Search -->
    <header class="header">
        <div class="container">
            <div class="header-row">
                <a href="/" class="logo">✦ GugoPro</a>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Search Amazon...">
                    <button id="search-btn">🔍</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Category Tags -->
            <section class="category-section">
                <h2 id="cat-title">Categories</h2>
                <div class="tag-grid" id="main-categories"></div>
            </section>

            <!-- Subcategory Tags (shown after selecting a main category) -->
            <section class="subcategory-section" id="sub-section" style="display:none;">
                <div class="sub-header">
                    <h3 id="sub-title"></h3>
                    <button class="back-btn" id="back-btn">✕</button>
                </div>
                <div class="tag-grid" id="sub-categories"></div>
            </section>

            <!-- Quick Filters (shown after selecting subcategory) -->
            <section class="filters-section" id="filters-section" style="display:none;">
                <div class="filter-row" id="filter-materials" style="display:none;">
                    <span class="filter-label" id="label-material">Material:</span>
                    <div class="filter-tags" id="material-tags"></div>
                </div>
                <div class="filter-row" id="filter-features" style="display:none;">
                    <span class="filter-label" id="label-features">Features:</span>
                    <div class="filter-tags" id="feature-tags"></div>
                </div>
                <div class="filter-row">
                    <span class="filter-label" id="label-price">Price:</span>
                    <div class="price-inputs">
                        <input type="number" id="price-min" placeholder="Min">
                        <span>-</span>
                        <input type="number" id="price-max" placeholder="Max">
                        <span class="currency" id="currency">USD</span>
                    </div>
                </div>
                <div class="filter-row">
                    <label class="rating-check">
                        <input type="checkbox" id="rating-filter">
                        <span id="rating-text">★4+ only</span>
                    </label>
                </div>
            </section>

            <!-- Preview & Go -->
            <section class="action-section" id="action-section" style="display:none;">
                <div class="preview-line">
                    <span class="preview-label">🔍</span>
                    <span class="preview-text" id="preview-text"></span>
                </div>
                <button class="go-btn" id="go-btn">
                    <span id="go-text">Search on Amazon</span> ➔
                </button>
            </section>

            <!-- Popular Searches -->
            <section class="popular-section">
                <h2 id="popular-title">Popular Searches</h2>
                <div class="popular-grid" id="popular-grid"></div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>As an Amazon Associate, I earn from qualifying purchases.<br>当サイトはAmazonアソシエイトに参加しています。</p>
            <p>© 2026 GugoPro</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
